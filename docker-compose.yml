services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      # Put GEMINI_API_KEY in a .env file next to this compose file,
      # or export it in your shell before `docker compose up`.
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      BATCH_SIZE: ${BATCH_SIZE:-100}
      CORS_ORIGIN: http://localhost:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-visible URL of the backend (inlined at build time).
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
